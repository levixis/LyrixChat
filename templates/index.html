<!DOCTYPE html>
<html lang="en" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyrixChat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
            }
        }
        
        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2); 
            border-radius: 20px;
        }

        .message-pop-in {
            animation: popIn 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            transform: scale(0.95) translateY(10px);
            opacity: 0;
        }
        @keyframes popIn {
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-[#050505] text-white font-sans flex items-center justify-center min-h-screen p-2 sm:p-4 overflow-hidden relative">

    <!-- 3D Canvas Background -->
    <canvas id="bg-canvas" class="absolute top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- Glassmorphism Chat Container -->
    <div id="chat-container" class="w-full max-w-3xl h-[95vh] sm:h-[90vh] flex flex-col bg-white/[0.03] backdrop-blur-3xl rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.8)] overflow-hidden border border-white/10 z-10 transition-all duration-300">
        
        <header class="flex items-center justify-between p-5 bg-transparent z-10 border-b border-white/5">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56] shadow-sm"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e] shadow-sm"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f] shadow-sm"></div>
            </div>
            <h1 class="text-xs font-semibold tracking-widest text-white/50 uppercase">LyrixChat</h1>
            <div class="w-12"></div> <!-- Spacer for centering -->
        </header>

        <main id="chat-window" class="flex-1 p-6 sm:p-8 space-y-8 overflow-y-auto">
            <!-- Chat messages appended here -->
        </main>

        <footer class="p-5 bg-transparent border-t border-white/5">
            <form id="chat-form" class="flex items-center space-x-3 relative">
                <input id="message-input" type="text" placeholder="Ask for lyrics (e.g., Hotel California by Eagles)" class="flex-1 w-full px-5 py-4 bg-white/5 text-white placeholder-white/30 rounded-2xl border border-white/10 focus:outline-none focus:border-white/30 focus:bg-white/10 transition-all duration-300" autocomplete="off">
                <button type="submit" id="send-btn" class="absolute right-2 bg-white/10 hover:bg-white/20 text-white rounded-xl p-3 border border-white/10 transition-all duration-300 ease-in-out hover:scale-105 focus:outline-none backdrop-blur-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform translate-x-0.5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
            <p class="text-center text-[10px] text-white/30 mt-3 font-medium tracking-widest uppercase">Powered by Hybrid AI</p>
        </footer>
    </div>

    <!-- 3D Sphere Logic -->
    <script>
        const canvas = document.querySelector('#bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 10;

        // Metallic Torus (Scaled up to bulge out at the bottom)
        const torusGeo = new THREE.TorusGeometry(6, 1.5, 64, 100);
        const metallicMat = new THREE.MeshStandardMaterial({
            color: 0xaaaaaa,
            metalness: 1.0,
            roughness: 0.15,
        });
        const torus = new THREE.Mesh(torusGeo, metallicMat);
        torus.position.set(2, -4, -3); // Spilling out from bottom right
        scene.add(torus);

        // Glass Sphere (Moved to top left edge)
        const geometry = new THREE.SphereGeometry(1.5, 64, 64);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 1.0,
            ior: 1.5,
            thickness: 2.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
        });
        const sphere = new THREE.Mesh(geometry, material);
        sphere.position.set(-4.5, 2.5, -2);
        scene.add(sphere);
        
        // Secondary floating sphere (Right edge)
        const sphere2 = new THREE.Mesh(new THREE.SphereGeometry(1.5, 64, 64), metallicMat);
        sphere2.position.set(5, 1, -2);
        scene.add(sphere2);

        // Third floating sphere (Bottom left edge)
        const sphere3 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), metallicMat);
        sphere3.position.set(-4, -3, -1);
        scene.add(sphere3);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const light1 = new THREE.DirectionalLight(0xffffff, 3.0);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0x38bdf8, 2.0);
        light2.position.set(-5, -5, -5);
        scene.add(light2);
        
        const orangeLight = new THREE.PointLight(0xf97316, 0, 15);
        orangeLight.position.set(0, 0, 2);
        scene.add(orangeLight);

        // Animation Loop
        const clock = new THREE.Clock();
        let isSearching = false;

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            const t = elapsedTime * 0.5;
            torus.rotation.x = t * 0.3;
            torus.rotation.y = t * 0.2;
            
            sphere.position.y = 3 + Math.sin(t) * 0.2;
            sphere2.position.y = 1 + Math.cos(t * 1.5) * 0.2;
            sphere3.position.y = -3 + Math.sin(t * 1.2) * 0.15;
            
            if (isSearching) {
                torus.rotation.x += 0.02;
                torus.rotation.y += 0.02;
                orangeLight.intensity = 10 + Math.sin(elapsedTime * 10) * 5;
            } else {
                orangeLight.intensity = gsap.utils.interpolate(orangeLight.intensity, 0, 0.1);
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // GSAP Mouse Parallax
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        gsap.ticker.add(() => {
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            sphere.rotation.y += 0.05 * (targetX - sphere.rotation.y);
            sphere.rotation.x += 0.05 * (targetY - sphere.rotation.x);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.startSearchAnimation = () => {
            isSearching = true;
            gsap.to(torus.scale, {x: 1.1, y: 1.1, z: 1.1, duration: 1, ease: "power2.out"});
        };

        window.stopSearchAnimation = () => {
            isSearching = false;
            gsap.to(torus.scale, {x: 1, y: 1, z: 1, duration: 1.5, ease: "power2.inOut"});
        };

        const chatFormEl = document.getElementById('chat-form');
        chatFormEl.addEventListener('mouseenter', () => {
            if(!isSearching) gsap.to(camera.position, {z: 9, duration: 1, ease: "power2.out"});
        });
        chatFormEl.addEventListener('mouseleave', () => {
            if(!isSearching) gsap.to(camera.position, {z: 10, duration: 1, ease: "power2.out"});
        });
    </script>

    <!-- App Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatWindow = document.getElementById('chat-window');
            const chatForm = document.getElementById('chat-form');
            const messageInput = document.getElementById('message-input');

            const scrollToBottom = () => {
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            };

            const addMessage = (html, sender) => {
                const messageWrapper = document.createElement('div');
                messageWrapper.className = `flex message-pop-in ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
                messageWrapper.innerHTML = html;
                chatWindow.appendChild(messageWrapper);
                scrollToBottom();
            };
            
            const showLoadingIndicator = () => {
                const loadingHTML = `
                    <div id="loading-indicator" class="flex justify-start message-pop-in">
                        <div class="bg-white/5 backdrop-blur-md border border-white/10 text-white p-4 rounded-2xl max-w-sm shadow-lg">
                            <div class="flex items-center space-x-2">
                                <span class="w-2 h-2 bg-white/50 rounded-full animate-bounce"></span>
                                <span class="w-2 h-2 bg-white/50 rounded-full animate-bounce" style="animation-delay: 0.1s;"></span>
                                <span class="w-2 h-2 bg-white/50 rounded-full animate-bounce" style="animation-delay: 0.2s;"></span>
                            </div>
                        </div>
                    </div>`;
                chatWindow.insertAdjacentHTML('beforeend', loadingHTML);
                scrollToBottom();
            };
            
            const removeLoadingIndicator = () => {
                const indicator = document.getElementById('loading-indicator');
                if (indicator) {
                    indicator.style.transition = 'opacity 0.3s ease';
                    indicator.style.opacity = '0';
                    setTimeout(() => indicator.remove(), 300);
                }
            };

            const renderWelcomeMessage = () => {
                const welcomeHTML = `
                    <div class="bg-white/5 backdrop-blur-md text-white p-6 rounded-2xl max-w-sm shadow-xl border border-white/10">
                        <h2 class="text-3xl font-light tracking-tight mb-2 opacity-90">Lyrix<span class="font-bold">Chat</span></h2>
                        <p class="text-sm font-light opacity-60 leading-relaxed">Search the universe for any song lyrics. I'll automatically detect typos, clean up your queries, and find the exact match.</p>
                    </div>`;
                addMessage(welcomeHTML, 'bot');
            };

            const renderUserMessage = (message) => {
                const userMessageHTML = `
                    <div class="bg-white/10 backdrop-blur-md border border-white/10 text-white p-4 rounded-2xl max-w-sm shadow-lg font-light">
                        ${message}
                    </div>`;
                addMessage(userMessageHTML, 'user');
            };

            const renderLyricsCard = (data) => {
                const albumArt = data.album_art || 'https://placehold.co/80x80/1e293b/a3a3a3?text=N/A';
                const lyricsHTML = `
                    <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-6 w-full max-w-lg shadow-2xl border border-white/10">
                        <div class="flex items-start space-x-5">
                            <img src="${albumArt}" alt="Album Art" class="w-20 h-20 rounded-xl object-cover shadow-lg border border-white/10">
                            <div class="flex-1 py-1">
                                <h2 class="font-bold text-2xl text-white tracking-tight leading-tight mb-1">${data.title}</h2>
                                <p class="text-sm font-medium text-white/50">${data.artist}</p>
                            </div>
                        </div>
                        <div class="mt-6 pt-6 border-t border-white/10 relative">
                            <div class="absolute top-0 left-0 w-full h-8 bg-gradient-to-b from-transparent to-transparent pointer-events-none"></div>
                            <p class="text-white/80 whitespace-pre-wrap text-[14px] leading-relaxed font-light">${data.content}</p>
                        </div>
                        ${data.spotify_url ? `
                        <div class="mt-6">
                            <a href="${data.spotify_url}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center space-x-2 w-full bg-white/10 hover:bg-white/20 text-white font-medium py-3 px-4 rounded-xl border border-white/10 transition-all duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.24 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.62 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                                <span>Listen on Spotify</span>
                            </a>
                        </div>
                        ` : ''}
                    </div>`;
                addMessage(lyricsHTML, 'bot');
            };
            
            const renderErrorMessage = (message) => {
                const errorHTML = `
                    <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-5 py-4 rounded-xl relative max-w-sm shadow-md" role="alert">
                        <strong class="font-bold flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span>Error</span>
                        </strong>
                        <span class="block mt-1 text-sm opacity-90">${message}</span>
                    </div>`;
                addMessage(errorHTML, 'bot');
            };

            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const message = messageInput.value.trim();
                
                if (!message) return;

                renderUserMessage(message);
                messageInput.value = '';
                
                showLoadingIndicator();
                if(window.startSearchAnimation) window.startSearchAnimation();

                const formData = new FormData();
                formData.append('message', message);

                fetch('/chat', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    removeLoadingIndicator();
                    if(window.stopSearchAnimation) window.stopSearchAnimation();

                    if (data.type === 'lyrics') {
                        renderLyricsCard(data);
                    } else if (data.type === 'error') {
                        renderErrorMessage(data.content);
                    }
                })
                .catch(error => {
                    console.error('Fetch Error:', error);
                    removeLoadingIndicator();
                    if(window.stopSearchAnimation) window.stopSearchAnimation();
                    renderErrorMessage('A connection error occurred. Please make sure the server is running and try again.');
                });
            });

            setTimeout(() => {
                renderWelcomeMessage();
            }, 300);
        });
    </script>
</body>
</html>

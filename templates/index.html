<!DOCTYPE html>
<html lang="en" class=""> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyrixChat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        /* Custom base styles and components */
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
            }
        }
        
        /* Custom class for the chat window scrollbar */
        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background-color: rgba(148, 163, 184, 0.5); /* slate-400 transparent */
            border-radius: 20px;
        }

        /* Animation for incoming messages */
        .message-pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0.9) translateY(10px);
            opacity: 0;
        }
        @keyframes popIn {
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Styles for the theme switcher toggle */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #f97316; /* orange-500 */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #f97316; /* orange-500 */
        }
    </style>

    <script>
        // Set Tailwind dark mode configuration
        tailwind.config = {
            darkMode: 'class', // Enable class-based dark mode
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 flex items-center justify-center min-h-screen p-2 sm:p-4 overflow-hidden relative">

    <!-- 3D Canvas Background -->
    <canvas id="bg-canvas" class="absolute top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- Glassmorphism Chat Container -->
    <div id="chat-container" class="w-full max-w-2xl h-[95vh] sm:h-[90vh] flex flex-col bg-white/60 dark:bg-slate-800/60 backdrop-blur-2xl rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.15)] overflow-hidden border border-white/50 dark:border-white/10 z-10 transition-all duration-300">
        
        <header class="flex items-center justify-between p-4 bg-slate-700/80 dark:bg-slate-900/60 backdrop-blur-md text-white shadow-sm z-10">
            <h1 class="text-xl font-bold tracking-wider drop-shadow-md">LyrixChat</h1>
            <div class="flex items-center space-x-2">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="theme-switcher" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="theme-switcher" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-400 cursor-pointer"></label>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </div>
        </header>

        <main id="chat-window" class="flex-1 p-4 sm:p-6 space-y-6 overflow-y-auto">
            </main>

        <footer class="p-4 bg-white/40 dark:bg-slate-800/40 backdrop-blur-md border-t border-gray-200/50 dark:border-slate-700/50">
            <form id="chat-form" class="flex items-center space-x-3">
                <input id="message-input" type="text" placeholder="Ask for lyrics (e.g., Hotel California by Eagles)" class="flex-1 w-full px-4 py-3 bg-white/80 dark:bg-slate-900/60 text-gray-800 dark:text-gray-200 rounded-full border border-gray-200 dark:border-slate-600 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all duration-300 shadow-inner" autocomplete="off">
                <button type="submit" id="send-btn" class="flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white rounded-full p-3 transition-transform duration-300 ease-in-out hover:scale-110 hover:shadow-lg hover:shadow-orange-500/50 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform translate-x-0.5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
            <p class="text-center text-xs text-slate-500 dark:text-slate-400 mt-3 font-medium tracking-wide">Crafted with ❤️ by levixis</p>
        </footer>
    </div>

    <!-- 3D Sphere Logic -->
    <script>
        // --- THREE.JS SPHERE BACKGROUND ---
        const canvas = document.querySelector('#bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 6;

        // Glassmorphism Sphere
        const geometry = new THREE.SphereGeometry(1.8, 64, 64);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.15,
            transmission: 0.95, // glass effect
            ior: 1.5,
            thickness: 1.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            transparent: true,
            opacity: 1
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Inner Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 300;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i < particlesCount * 3; i++) {
            // Random positions inside sphere
            const radius = 1.7 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i+1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i+2] = radius * Math.cos(phi);
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.03,
            color: 0xf97316, // Brand Orange
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xf97316, 2.5); // Orange tint
        directionalLight.position.set(2, 2, 2);
        scene.add(directionalLight);

        const blueLight = new THREE.DirectionalLight(0x38bdf8, 2); // Sky blue tint
        blueLight.position.set(-2, -2, -2);
        scene.add(blueLight);

        // Animation Loop
        const clock = new THREE.Clock();
        let isSearching = false;

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            // Idle float animation
            sphere.position.y = Math.sin(elapsedTime * 0.8) * 0.15;
            
            // Particle rotation
            particlesMesh.rotation.y = elapsedTime * (isSearching ? 0.8 : 0.1);
            particlesMesh.rotation.x = elapsedTime * (isSearching ? 0.4 : 0.05);
            
            if (isSearching) {
                // Pulse effect
                sphere.scale.setScalar(1 + Math.sin(elapsedTime * 5) * 0.04);
            } else {
                // Smoothly return to normal scale
                sphere.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // GSAP Mouse Parallax
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        gsap.ticker.add(() => {
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            // Magnetic tilt
            sphere.rotation.y += 0.05 * (targetX - sphere.rotation.y);
            sphere.rotation.x += 0.05 * (targetY - sphere.rotation.x);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Global animation triggers
        window.startSearchAnimation = () => {
            isSearching = true;
            gsap.to(directionalLight, { intensity: 6, duration: 1, ease: "power2.out" });
            gsap.to(blueLight, { intensity: 4, duration: 1, ease: "power2.out" });
            gsap.to(particlesMaterial, { size: 0.08, duration: 1, ease: "power2.out" });
            
            // Impact Ripple effect on submit
            gsap.fromTo(sphere.scale, 
                {x: 0.8, y: 0.8, z: 0.8}, 
                {x: 1.1, y: 1.1, z: 1.1, duration: 0.6, ease: "elastic.out(1, 0.3)"}
            );
        };

        window.stopSearchAnimation = () => {
            isSearching = false;
            gsap.to(directionalLight, { intensity: 2.5, duration: 1.5, ease: "power2.inOut" });
            gsap.to(blueLight, { intensity: 2, duration: 1.5, ease: "power2.inOut" });
            gsap.to(particlesMaterial, { size: 0.03, duration: 1.5, ease: "power2.inOut" });
        };

        // Theme sync for Sphere
        const syncSphereTheme = (isDark) => {
            if (isDark) {
                gsap.to(material.color, {r: 0.1, g: 0.1, b: 0.2, duration: 1});
            } else {
                gsap.to(material.color, {r: 1, g: 1, b: 1, duration: 1});
            }
        };

        // Hover magnetic effect on input area
        const chatFormEl = document.getElementById('chat-form');
        chatFormEl.addEventListener('mouseenter', () => {
            if(!isSearching) gsap.to(sphere.position, {z: 0.5, duration: 0.8, ease: "power2.out"});
        });
        chatFormEl.addEventListener('mouseleave', () => {
            if(!isSearching) gsap.to(sphere.position, {z: 0, duration: 0.8, ease: "power2.out"});
        });
    </script>

    <!-- App Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Element References ---
            const chatWindow = document.getElementById('chat-window');
            const chatForm = document.getElementById('chat-form');
            const messageInput = document.getElementById('message-input');
            const themeSwitcher = document.getElementById('theme-switcher');

            // --- Dark Mode Logic ---
            const userTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

            const themeCheck = () => {
                const isDark = userTheme === 'dark' || (!userTheme && systemTheme);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    themeSwitcher.checked = true;
                } else {
                    document.documentElement.classList.remove('dark');
                    themeSwitcher.checked = false;
                }
                if (window.syncSphereTheme) syncSphereTheme(isDark);
            };
            
            const themeSwitch = () => {
                const willBeDark = !document.documentElement.classList.contains('dark');
                if (willBeDark) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
                if (window.syncSphereTheme) syncSphereTheme(willBeDark);
            };

            themeSwitcher.addEventListener('click', themeSwitch);
            themeCheck(); // Initial check on page load


            // --- Chat Message Rendering Functions ---
            const scrollToBottom = () => {
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            };

            const addMessage = (html, sender) => {
                const messageWrapper = document.createElement('div');
                messageWrapper.className = `flex message-pop-in ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
                messageWrapper.innerHTML = html;
                chatWindow.appendChild(messageWrapper);
                scrollToBottom();
            };
            
            const showLoadingIndicator = () => {
                const loadingHTML = `
                    <div id="loading-indicator" class="flex justify-start message-pop-in">
                        <div class="bg-white/80 dark:bg-slate-700/80 backdrop-blur-sm text-gray-800 dark:text-gray-200 p-4 rounded-2xl max-w-sm shadow-md border border-white/20">
                            <div class="flex items-center space-x-2">
                                <span class="w-2.5 h-2.5 bg-orange-500 rounded-full animate-bounce"></span>
                                <span class="w-2.5 h-2.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay: 0.1s;"></span>
                                <span class="w-2.5 h-2.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay: 0.2s;"></span>
                            </div>
                        </div>
                    </div>`;
                chatWindow.insertAdjacentHTML('beforeend', loadingHTML);
                scrollToBottom();
            };
            
            const removeLoadingIndicator = () => {
                const indicator = document.getElementById('loading-indicator');
                if (indicator) {
                    // Fade out nicely
                    indicator.style.transition = 'opacity 0.3s ease';
                    indicator.style.opacity = '0';
                    setTimeout(() => indicator.remove(), 300);
                }
            };

            const renderWelcomeMessage = () => {
                const welcomeHTML = `
                    <div class="bg-white/90 dark:bg-slate-700/90 backdrop-blur-md text-gray-800 dark:text-gray-200 p-5 rounded-2xl max-w-sm shadow-lg border border-white/20">
                        <p class="font-bold text-lg mb-1">Welcome!</p>
                        <p class="text-sm opacity-90">Ask me for song lyrics or info. I'll search the universe for you.</p>
                    </div>`;
                addMessage(welcomeHTML, 'bot');
            };

            const renderUserMessage = (message) => {
                const userMessageHTML = `
                    <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-4 rounded-2xl max-w-sm shadow-lg shadow-orange-500/30">
                        ${message}
                    </div>`;
                addMessage(userMessageHTML, 'user');
            };

            const renderLyricsCard = (data) => {
                // Use a default image if album_art is missing
                const albumArt = data.album_art || 'https://placehold.co/80x80/1e293b/a3a3a3?text=N/A';
                const lyricsHTML = `
                    <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-3xl p-5 w-full max-w-lg shadow-xl border border-white/20 dark:border-white/5">
                        <div class="flex items-start space-x-4">
                            <img src="${albumArt}" alt="Album Art" class="w-24 h-24 rounded-2xl object-cover shadow-lg border border-gray-100 dark:border-slate-700">
                            <div class="flex-1 py-1">
                                <h2 class="font-black text-xl text-gray-900 dark:text-white leading-tight mb-1">${data.title}</h2>
                                <p class="text-sm font-medium text-orange-600 dark:text-orange-400">${data.artist}</p>
                            </div>
                        </div>
                        <div class="mt-5 pt-5 border-t border-slate-200 dark:border-slate-700/50 relative">
                            <div class="absolute top-0 left-0 w-full h-8 bg-gradient-to-b from-white/90 dark:from-slate-800/90 to-transparent pointer-events-none"></div>
                            <p class="text-gray-700 dark:text-gray-300 whitespace-pre-wrap text-[15px] leading-relaxed font-medium">${data.content}</p>
                        </div>
                        ${data.spotify_url ? `
                        <div class="mt-6">
                            <a href="${data.spotify_url}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center space-x-2 w-full bg-[#1DB954] hover:bg-[#1ed760] text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 shadow-lg shadow-green-500/20 hover:shadow-green-500/40 hover:-translate-y-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.24 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.62 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                                <span>Listen on Spotify</span>
                            </a>
                        </div>
                        ` : ''}
                    </div>`;
                addMessage(lyricsHTML, 'bot');
            };
            
            const renderErrorMessage = (message) => {
                const errorHTML = `
                    <div class="bg-red-50 dark:bg-red-900/40 border-l-4 border-red-500 text-red-700 dark:text-red-300 px-5 py-4 rounded-xl relative max-w-sm shadow-md" role="alert">
                        <strong class="font-bold flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span>Oops!</span>
                        </strong>
                        <span class="block mt-1 text-sm">${message}</span>
                    </div>`;
                addMessage(errorHTML, 'bot');
            };

            // --- Main Chat Logic ---
            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const message = messageInput.value.trim();
                
                if (!message) return;

                renderUserMessage(message);
                messageInput.value = '';
                
                showLoadingIndicator();
                if(window.startSearchAnimation) window.startSearchAnimation(); // Trigger 3D Sphere animation

                // --- REAL BACKEND CONNECTION ---
                const formData = new FormData();
                formData.append('message', message);

                fetch('/chat', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    removeLoadingIndicator();
                    if(window.stopSearchAnimation) window.stopSearchAnimation();

                    if (data.type === 'lyrics') {
                        renderLyricsCard(data);
                    } else if (data.type === 'error') {
                        renderErrorMessage(data.content);
                    }
                })
                .catch(error => {
                    console.error('Fetch Error:', error);
                    removeLoadingIndicator();
                    if(window.stopSearchAnimation) window.stopSearchAnimation();
                    renderErrorMessage('A connection error occurred. Please make sure the server is running and try again.');
                });
            });

            // --- Initial State ---
            setTimeout(() => {
                renderWelcomeMessage();
            }, 500); // Slight delay for entrance effect
        });
    </script>

</body>
</html>
